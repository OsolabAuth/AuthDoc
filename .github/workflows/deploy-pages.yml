name: Deploy selected docs branch to Pages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to publish"
        required: true
        default: "codex/port-health-check"
      run_summary:
        description: "Regenerate SUMMARY.md before build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      render_plantuml:
        description: "Render PlantUML via external server"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Honkit docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Regenerate summary
        if: ${{ inputs.run_summary == 'true' }}
        run: npm run summary

      - name: Normalize PlantUML blocks
        run: |
          node <<'JS'
          const fs = require("fs");
          const path = require("path");

          const root = process.cwd();

          function walk(dir) {
            if (!fs.existsSync(dir)) {
              return [];
            }

            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                return walk(fullPath);
              }
              return entry.isFile() && entry.name.endsWith(".md") ? [fullPath] : [];
            });
          }

          for (const dir of ["API", "Architecture", "Data"]) {
            for (const filePath of walk(path.join(root, dir))) {
              const source = fs.readFileSync(filePath, "utf8");
              const converted = source.replace(
                /participant\s+UI\s+as\s+Auth UI/g,
                'participant "Auth UI" as UI',
              );
              if (converted !== source) {
                fs.writeFileSync(filePath, converted);
              }
            }
          }
          JS

      - name: Prepare review build
        if: ${{ inputs.render_plantuml == 'false' }}
        run: |
          node <<'JS'
          const fs = require("fs");
          const path = require("path");

          const root = process.cwd();
          const bookPath = path.join(root, "book.json");

          function walk(dir) {
            if (!fs.existsSync(dir)) {
              return [];
            }

            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                return walk(fullPath);
              }
              return entry.isFile() && entry.name.endsWith(".md") ? [fullPath] : [];
            });
          }

          const book = JSON.parse(fs.readFileSync(bookPath, "utf8"));
          book.plugins = (book.plugins || []).filter((plugin) => plugin !== "plantuml-server");
          delete book.pluginsConfig?.["plantuml-server"];
          fs.writeFileSync(bookPath, `${JSON.stringify(book, null, 2)}\n`);

          for (const dir of ["API", "Architecture", "Data"]) {
            for (const filePath of walk(path.join(root, dir))) {
              const source = fs.readFileSync(filePath, "utf8");
              const converted = source.replace(
                /{%\s*uml\s*%}\r?\n([\s\S]*?)\r?\n{%\s*enduml\s*%}/g,
                "```text\n$1\n```",
              ).replace(/```plantuml/g, "```text");
              if (converted !== source) {
                fs.writeFileSync(filePath, converted);
              }
            }
          }
          JS

      - name: Build docs
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
